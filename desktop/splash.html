<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSTerp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      height: 300px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 24px;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .status {
      font-size: 13px;
      color: #a0a0b0;
      margin-bottom: 24px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <img class="logo" src="../www/img/logo_left.png" alt="MSTerp"
       onerror="this.style.display='none'">
  <div class="title">MSTerp</div>
  <div class="status">Loading...</div>
  <div class="spinner"></div>
</body>
</html>
