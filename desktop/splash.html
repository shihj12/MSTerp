<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSTerp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      height: 300px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #2a2a2a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 24px;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .status {
      font-size: 13px;
      color: #a0a0a0;
      margin-bottom: 6px;
      text-align: center;
    }

    .timer {
      font-size: 11px;
      color: #707070;
      margin-bottom: 20px;
    }

    /* Orbiting dots loader */
    .orbit-loader {
      position: relative;
      width: 40px;
      height: 40px;
      animation: orbit-spin 1.2s linear infinite;
    }
    .orbit-loader .dot {
      position: absolute;
      width: 5px;
      height: 5px;
      background: #e0e0e0;
      border-radius: 50%;
      top: 50%;
      left: 50%;
    }
    .orbit-loader .dot:nth-child(1) { transform: translate(-50%,-50%) rotate(0deg)   translateY(-16px); opacity: 1;    }
    .orbit-loader .dot:nth-child(2) { transform: translate(-50%,-50%) rotate(45deg)  translateY(-16px); opacity: 0.85; }
    .orbit-loader .dot:nth-child(3) { transform: translate(-50%,-50%) rotate(90deg)  translateY(-16px); opacity: 0.7;  }
    .orbit-loader .dot:nth-child(4) { transform: translate(-50%,-50%) rotate(135deg) translateY(-16px); opacity: 0.55; }
    .orbit-loader .dot:nth-child(5) { transform: translate(-50%,-50%) rotate(180deg) translateY(-16px); opacity: 0.4;  }
    .orbit-loader .dot:nth-child(6) { transform: translate(-50%,-50%) rotate(225deg) translateY(-16px); opacity: 0.3;  }
    .orbit-loader .dot:nth-child(7) { transform: translate(-50%,-50%) rotate(270deg) translateY(-16px); opacity: 0.2;  }
    .orbit-loader .dot:nth-child(8) { transform: translate(-50%,-50%) rotate(315deg) translateY(-16px); opacity: 0.1;  }

    @keyframes orbit-spin {
      to { transform: rotate(360deg); }
    }

    .first-run {
      font-size: 11px;
      color: #808080;
      text-align: center;
      margin-top: 16px;
      max-width: 320px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <img class="logo" src="assets/icon.png" alt="MSTerp"
       onerror="this.style.display='none'">
  <div class="title">MSTerp</div>
  <div class="status" id="status">Starting R...</div>
  <div class="timer" id="timer"></div>
  <div class="orbit-loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="first-run" id="first-run"></div>

  <script>
    const startTime = Date.now();
    const statusEl = document.getElementById("status");
    const timerEl = document.getElementById("timer");
    const firstRunEl = document.getElementById("first-run");

    const messages = [
      { after: 0,  text: "Starting R..." },
      { after: 3,  text: "Loading packages..." },
      { after: 10, text: "Loading packages... (this may take a moment)" },
      { after: 30, text: "Still loading packages..." },
      { after: 60, text: "Almost there..." },
    ];

    setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      timerEl.textContent = elapsed + "s";

      // Update status message based on elapsed time
      for (let i = messages.length - 1; i >= 0; i--) {
        if (elapsed >= messages[i].after) {
          statusEl.textContent = messages[i].text;
          break;
        }
      }

      // Show first-run notice after 15 seconds
      if (elapsed >= 15 && !firstRunEl.textContent) {
        firstRunEl.textContent = "First launch takes longer while R initializes. Subsequent launches will be much faster.";
      }
    }, 1000);
  </script>
</body>
</html>
