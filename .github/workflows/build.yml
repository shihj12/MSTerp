name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'

      - name: Prepare portable R
        shell: pwsh
        run: .\desktop\scripts\prepare-r-portable.ps1

      - name: Install R packages
        shell: pwsh
        run: .\desktop\scripts\install-r-packages.ps1

      - name: Publish C# WebView2 wrapper
        shell: pwsh
        run: dotnet publish desktop-webview2\MSTerp.csproj -c Release -r win-x64 --self-contained false -o desktop-webview2\publish

      - name: Install InnoSetup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc desktop-webview2\installer.iss

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-webview2/dist/*.exe
